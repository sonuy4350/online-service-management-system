{% extends "base.html" %}
{% block title %}Notifications{% endblock %}
{% block content %}
<div class="container mt-4">
  <h3>🔔 Notifications</h3>
  <ul class="list-group">
    {% for n in notifications %}
      <li class="list-group-item d-flex justify-content-between align-items-center {% if not n.is_read %}list-group-item-info{% endif %}">
        <a href="{{ url_for('mark_read', note_id=n.id) }}">{{ n.message }}</a>
        <small class="text-muted">{{ n.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
      </li>
    {% else %}
      <li class="list-group-item">No notifications</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
